<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI Runner : Escape from Virus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <!-- 메인 메뉴 -->
    <div id="screen-menu" class="screen active">
      <div class="menu-bg"></div>
      <h1 class="game-title">AI Runner</h1>
      <p class="game-subtitle">Escape from Virus</p>
      <div class="menu-buttons">
        <button class="btn btn-primary" id="btn-start">▶ 게임 시작</button>
        <button class="btn btn-secondary" id="btn-settings-menu">⚙ 설정</button>
      </div>
      <p class="high-score-label">최고 기록: <span id="menu-high-score">0</span></p>
    </div>

    <!-- 캐릭터 선택 -->
    <div id="screen-select" class="screen">
      <h2>캐릭터 선택</h2>
      <div class="character-cards">
        <div class="char-card selected" data-char="ppiya">
          <canvas class="char-preview-canvas" width="140" height="140"></canvas>
          <h3>삐야</h3>
          <p>노란 AI 병아리</p>
          <div class="char-stats">
            <span class="char-stat stat-hp">❤️ 최대 3</span>
            <span class="char-stat stat-hit stat-small">세로 피격: 작음</span>
          </div>
          <span class="char-desc">민첩하게 피해 나가는 타입</span>
        </div>
        <div class="char-card" data-char="oru">
          <canvas class="char-preview-canvas" width="140" height="140"></canvas>
          <h3>오르</h3>
          <p>AI 흰 곰</p>
          <div class="char-stats">
            <span class="char-stat stat-hp">❤️ 최대 5</span>
            <span class="char-stat stat-hit stat-wide">세로 피격: 넓음</span>
          </div>
          <span class="char-desc">체력이 높은 탱커 타입</span>
        </div>
      </div>
      <p class="select-hint">점선 박스 = 세로 피격 범위</p>
      <div class="select-buttons">
        <button class="btn btn-secondary" id="btn-back-menu">← 메인으로</button>
        <button class="btn btn-primary" id="btn-play">▶ 선택 완료</button>
      </div>
    </div>

    <!-- 설정 -->
    <div id="screen-settings" class="screen">
      <h2>설정</h2>
      <div class="settings-tabs">
        <button class="settings-tab active" data-tab="audio">소리</button>
        <button class="settings-tab" data-tab="controls">조작</button>
      </div>

      <div class="settings-panel active" id="panel-audio">
        <div class="setting-row">
          <label class="setting-label">
            <span>배경음악</span>
            <input type="checkbox" id="setting-bgm-enabled" checked>
          </label>
        </div>
        <div class="setting-row">
          <label for="setting-bgm-volume">BGM 볼륨</label>
          <input type="range" id="setting-bgm-volume" min="0" max="100" value="35">
          <span class="setting-value" id="setting-bgm-value">35%</span>
        </div>
        <div class="setting-row">
          <label class="setting-label">
            <span>효과음</span>
            <input type="checkbox" id="setting-sfx-enabled" checked>
          </label>
        </div>
        <div class="setting-row">
          <label for="setting-sfx-volume">효과음 볼륨</label>
          <input type="range" id="setting-sfx-volume" min="0" max="100" value="60">
          <span class="setting-value" id="setting-sfx-value">60%</span>
        </div>
        <button class="btn btn-test-sfx" id="btn-test-sfx">효과음 테스트</button>
      </div>

      <div class="settings-panel" id="panel-controls">
        <div class="setting-row key-row">
          <span class="key-action">왼쪽 이동</span>
          <kbd class="key-display" id="key-display-left"></kbd>
          <button class="btn btn-key-bind" data-action="left">변경</button>
        </div>
        <div class="setting-row key-row">
          <span class="key-action">오른쪽 이동</span>
          <kbd class="key-display" id="key-display-right"></kbd>
          <button class="btn btn-key-bind" data-action="right">변경</button>
        </div>
        <div class="setting-row key-row">
          <span class="key-action">점프</span>
          <kbd class="key-display" id="key-display-jump"></kbd>
          <button class="btn btn-key-bind" data-action="jump">변경</button>
        </div>
        <div class="setting-row key-row">
          <span class="key-action">슬라이딩</span>
          <kbd class="key-display" id="key-display-slide"></kbd>
          <button class="btn btn-key-bind" data-action="slide">변경</button>
        </div>
        <p class="key-hint" id="key-bind-hint">모바일: 좌우/상하 스와이프로 조작</p>
        <button class="btn btn-secondary btn-reset-keys" id="btn-reset-keys">기본값으로 초기화</button>
      </div>

      <button class="btn btn-primary" id="btn-settings-back">돌아가기</button>
    </div>

    <!-- 게임 화면 -->
    <div id="screen-game" class="screen">
      <canvas id="game-canvas"></canvas>
      <button id="btn-settings-game" class="btn-settings-gear" aria-label="설정">⚙</button>
      <div id="hud">
        <div class="hud-row">
          <span class="hud-label">점수</span>
          <span id="hud-score">0</span>
        </div>
        <div class="hud-row">
          <span class="hud-label">거리</span>
          <span id="hud-distance">0m</span>
        </div>
        <div class="hud-row lives" id="hud-lives"></div>
        <div class="hud-row combo" id="hud-combo"></div>
      </div>
    </div>

    <!-- 게임 오버 -->
    <div id="screen-over" class="screen">
      <h2 class="over-title">Game Over</h2>
      <div class="over-stats">
        <p>점수: <span id="over-score">0</span></p>
        <p>거리: <span id="over-distance">0</span>m</p>
        <p class="over-best">최고 기록: <span id="over-high-score">0</span></p>
      </div>
      <div class="over-buttons">
        <button class="btn btn-primary" id="btn-retry">다시 하기</button>
        <button class="btn btn-secondary" id="btn-over-menu">메인으로</button>
      </div>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="settings.js"></script>
  <script src="game.js"></script>
</body>
</html>
